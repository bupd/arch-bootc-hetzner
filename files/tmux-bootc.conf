set -g allow-passthrough on
set -g set-clipboard on
set -g mouse off

# Run the server-local sessionizer directly so the active client follows it.
bind-key -T prefix k new-window "/var/home/bupd/sessionizer"

# Use an explicit OSC52 helper so copy works through nested tmux over SSH.
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "/var/home/bupd/.local/bin/tmux-osc52-copy #{pane_tty}"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "/var/home/bupd/.local/bin/tmux-osc52-copy #{pane_tty}"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "/var/home/bupd/.local/bin/tmux-osc52-copy #{pane_tty}"
