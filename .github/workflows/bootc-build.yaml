name: Bootc CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/bootc
  BASE_IMAGE_TAG: localhost/arch-bootc-base:latest
  FINAL_IMAGE_TAG: localhost/arch-bootc-hetzner:latest
  CHUNKED_IMAGE_TAG: localhost/arch-bootc-hetzner-chunked:latest
  CHUNKAH_VERSION: v0.4.0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install lint dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Validate shell scripts
        run: |
          bash -n scripts/*.sh files/setup-repos.sh
          shellcheck scripts/*.sh files/setup-repos.sh

  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y podman jq curl

      - name: Compute podman build cache key
        id: podman-cache-key
        run: |
          git ls-files -s \
            Containerfile \
            Containerfile.base \
            scripts/build.sh \
            files \
            .github/workflows/bootc-build.yaml \
            | sha256sum \
            | cut -d ' ' -f1 \
            | sed 's/^/key=/' >> "$GITHUB_OUTPUT"

      - name: Restore podman build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /var/lib/containers/storage
          key: podman-build-${{ steps.podman-cache-key.outputs.key }}
          restore-keys: |
            podman-build-

      - name: Resolve dependency versions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          BOOTC_VERSION="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/bootc-dev/bootc/releases/latest | jq -r '.tag_name')"
          if [ -z "$BOOTC_VERSION" ] || [ "$BOOTC_VERSION" = "null" ]; then
            echo "Failed to resolve latest bootc release" >&2
            exit 1
          fi
          echo "BOOTC_VERSION=$BOOTC_VERSION" >> "$GITHUB_ENV"

      - name: Build base image
        run: |
          sudo podman build --pull=always --network=host \
            --build-arg "BOOTC_VERSION=$BOOTC_VERSION" \
            -f Containerfile.base \
            -t "$BASE_IMAGE_TAG" \
            .

      - name: Build final image
        run: |
          sudo podman build --network=host \
            --build-arg "BASE_IMAGE=$BASE_IMAGE_TAG" \
            -f Containerfile \
            -t "$FINAL_IMAGE_TAG" \
            .

      - name: Show built image
        run: sudo podman image inspect "$FINAL_IMAGE_TAG" >/dev/null

  publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install publish dependencies
        run: sudo apt-get update && sudo apt-get install -y podman jq curl

      - name: Publish image
        env:
          BOOTC_IMAGE_REFS: ${{ env.GHCR_IMAGE }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/build.sh

  disk:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y podman jq curl zstd

      - name: Generate and publish disk image
        env:
          BOOTC_IMAGE_REFS: ${{ env.GHCR_IMAGE }}
          BOOTC_DISK_SIZE: 40G
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/generate-disk.sh
