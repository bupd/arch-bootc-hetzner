name: Bootc CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag used for an explicit test build
        required: true
        default: sbom-test
        type: string

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/bootc
  BASE_IMAGE_TAG: localhost/arch-bootc-base:latest
  FINAL_IMAGE_TAG: localhost/arch-bootc-hetzner:latest

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install lint dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Validate shell scripts
        run: |
          bash -n scripts/*.sh files/setup-repos.sh
          shellcheck scripts/*.sh files/setup-repos.sh

      - name: Validate ALPM component manifest generator
        run: python3 -m unittest discover -s tests -v

  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y podman jq curl

      - name: Compute podman build cache key
        id: podman-cache-key
        run: |
          git ls-files -s \
            Containerfile \
            Containerfile.base \
            scripts/build.sh \
            files \
            .github/workflows/bootc-build.yaml \
            | sha256sum \
            | cut -d ' ' -f1 \
            | sed 's/^/key=/' >> "$GITHUB_OUTPUT"

      - name: Restore podman build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /var/lib/containers/storage
          key: podman-build-${{ steps.podman-cache-key.outputs.key }}
          restore-keys: |
            podman-build-

      - name: Resolve dependency versions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          BOOTC_VERSION="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/bootc-dev/bootc/releases/latest | jq -r '.tag_name')"
          if [ -z "$BOOTC_VERSION" ] || [ "$BOOTC_VERSION" = "null" ]; then
            echo "Failed to resolve latest bootc release" >&2
            exit 1
          fi
          echo "BOOTC_VERSION=$BOOTC_VERSION" >> "$GITHUB_ENV"

      - name: Build base image
        run: |
          sudo podman build --pull=always --network=host \
            --build-arg "BOOTC_VERSION=$BOOTC_VERSION" \
            -f Containerfile.base \
            -t "$BASE_IMAGE_TAG" \
            .

      - name: Build final image
        run: |
          sudo podman build --network=host \
            --build-arg "BASE_IMAGE=$BASE_IMAGE_TAG" \
            -f Containerfile \
            -t "$FINAL_IMAGE_TAG" \
            .

      - name: Show built image
        run: sudo podman image inspect "$FINAL_IMAGE_TAG" >/dev/null

  publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    needs: lint
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup bootc build runner
        uses: projectbluefin/actions/bootc-build/setup-runner@d8f871c0ca7a868339d3c175200a7319492473c7 # v1
        with:
          storage-backend: btrfs
          update-podman: "true"

      - name: Resolve build metadata
        id: metadata
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REQUESTED_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${REQUESTED_TAG}"
          else
            tag="latest"
          fi
          if [[ ! "${tag}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid OCI tag: ${tag}" >&2
            exit 1
          fi
          bootc_version="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/bootc-dev/bootc/releases/latest | jq -r '.tag_name')"
          if [[ -z "${bootc_version}" || "${bootc_version}" == "null" ]]; then
            echo "Failed to resolve latest bootc release" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "bootc-version=${bootc_version}" >> "${GITHUB_OUTPUT}"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Build base image
        run: |
          sudo podman build --pull=always --network=host \
            --build-arg "BOOTC_VERSION=${{ steps.metadata.outputs.bootc-version }}" \
            -f Containerfile.base \
            -t "${BASE_IMAGE_TAG}" \
            .

      - name: Build final image
        run: |
          sudo podman build --network=host \
            --build-arg "BASE_IMAGE=${BASE_IMAGE_TAG}" \
            --build-arg "IMAGE_CREATED=${{ steps.metadata.outputs.created }}" \
            --build-arg "IMAGE_REVISION=${GITHUB_SHA}" \
            --build-arg "IMAGE_VERSION=${{ steps.metadata.outputs.tag }}" \
            -f Containerfile \
            -t "${FINAL_IMAGE_TAG}" \
            .

      - name: Generate ALPM component ownership
        env:
          MANIFEST_PATH: ${{ runner.temp }}/alpm-components.tsv
        run: |
          set -euo pipefail
          cid="$(sudo podman create "${FINAL_IMAGE_TAG}")"
          cleanup() {
            sudo podman unmount "${cid}" >/dev/null 2>&1 || true
            sudo podman rm -f "${cid}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          root="$(sudo podman mount "${cid}")"
          sudo python3 scripts/generate-alpm-component-manifest.py \
            --root "${root}" \
            --output "${MANIFEST_PATH}"
          sudo chown "$(id -u):$(id -g)" "${MANIFEST_PATH}"
          test "$(grep -cv '^#' "${MANIFEST_PATH}")" -gt 0

      - name: Rechunk image with ALPM components
        uses: projectbluefin/actions/bootc-build/chunka@d8f871c0ca7a868339d3c175200a7319492473c7 # v1
        with:
          source-image: localhost/arch-bootc-hetzner:latest
          output-image: bootc:${{ steps.metadata.outputs.tag }}
          max-layers: "128"
          xattr-manifest: ${{ runner.temp }}/alpm-components.tsv

      - name: Export image for vulnerability scan
        run: |
          sudo podman save --format docker-archive \
            -o "${RUNNER_TEMP}/scan-image.tar" \
            "bootc:${{ steps.metadata.outputs.tag }}"

      - name: Scan image
        continue-on-error: true
        uses: projectbluefin/actions/bootc-build/scan-image@d8f871c0ca7a868339d3c175200a7319492473c7 # v1
        with:
          image: bootc:${{ steps.metadata.outputs.tag }}
          input: ${{ runner.temp }}/scan-image.tar
          severity-threshold: CRITICAL
          exit-code: "0"
          create-issue: "false"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        id: push
        uses: projectbluefin/actions/bootc-build/push-image@d8f871c0ca7a868339d3c175200a7319492473c7 # v1
        with:
          image-name: bootc
          tags: ${{ steps.metadata.outputs.tag }}
          default-tag: ${{ steps.metadata.outputs.tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image, attach SBOM, and publish provenance
        id: publish-metadata
        uses: projectbluefin/actions/bootc-build/sign-and-publish@d8f871c0ca7a868339d3c175200a7319492473c7 # v1
        with:
          image: ${{ env.GHCR_IMAGE }}
          digest: ${{ steps.push.outputs.digest }}
          signing-mode: keyless
          generate-sbom: "true"
          push-attestation: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          syft-version: v1.46.0
          image-name: bootc
          certificate-identity-regexp: '^https://github\.com/bupd/arch-bootc-hetzner/\.github/workflows/bootc-build\.yaml@'

      - name: Verify published metadata and ALPM SBOM
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          SBOM_DIGEST: ${{ steps.publish-metadata.outputs.sbom-digest }}
        run: |
          set -euo pipefail
          image="${GHCR_IMAGE}@${DIGEST}"
          labels="$(skopeo inspect "docker://${image}" | jq '.Labels')"
          jq -e '
            .["org.opencontainers.image.source"] == "https://github.com/bupd/arch-bootc-hetzner" and
            .["org.opencontainers.image.title"] == "Arch Linux bootc for Hetzner"
          ' <<< "${labels}"

          component_layers="$(skopeo inspect --raw "docker://${image}" | jq '
            [.layers[]? | select(.annotations["ostree.components"] != null)] | length
          ')"
          test "${component_layers}" -gt 0

          sbom_dir="${RUNNER_TEMP}/attached-sbom"
          mkdir -p "${sbom_dir}"
          oras pull --output "${sbom_dir}" "${GHCR_IMAGE}@${SBOM_DIGEST}"
          sbom="${sbom_dir}/sbom.json"
          alpm_packages="$(jq '
            [.packages[]? | select(any(.externalRefs[]?;
              (.referenceLocator // "") | startswith("pkg:alpm/")))] | length
          ' "${sbom}")"
          test "${alpm_packages}" -gt 0
          echo "Published ${alpm_packages} ALPM packages across ${component_layers} component layers" \
            | tee -a "${GITHUB_STEP_SUMMARY}"

  disk:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y podman jq curl zstd

      - name: Generate and publish disk image
        env:
          BOOTC_IMAGE_REFS: ${{ env.GHCR_IMAGE }}
          BOOTC_DISK_SIZE: 40G
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/generate-disk.sh
