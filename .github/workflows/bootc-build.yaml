name: Bootc CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.REGISTRY }}
  REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT }}
  REGISTRY_USERNAME: ${{ vars.REGISTRY_USERNAME }}
  BASE_IMAGE_TAG: localhost/arch-bootc-base:latest
  FINAL_IMAGE_TAG: localhost/arch-bootc-hetzner:latest
  CHUNKED_IMAGE_TAG: localhost/arch-bootc-hetzner-chunked:latest

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install lint dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Validate shell scripts
        run: |
          bash -n scripts/*.sh files/setup-repos.sh
          shellcheck scripts/*.sh files/setup-repos.sh

  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y podman jq curl

      - name: Restore podman build cache
        uses: actions/cache@v5
        with:
          path: /var/lib/containers/storage
          key: podman-build-${{ hashFiles('Containerfile', 'Containerfile.base', 'scripts/build.sh', 'files/**', '.github/workflows/bootc-build.yaml') }}
          restore-keys: |
            podman-build-

      - name: Resolve dependency versions
        run: |
          echo "BOOTC_VERSION=$(curl -fsSL https://api.github.com/repos/bootc-dev/bootc/releases/latest | jq -r '.tag_name')" >> "$GITHUB_ENV"
          echo "CHUNKAH_VERSION=$(curl -fsSL https://api.github.com/repos/coreos/chunkah/releases/latest | jq -r '.tag_name')" >> "$GITHUB_ENV"

      - name: Build base image
        run: |
          podman build --pull=always --network=host \
            --build-arg "BOOTC_VERSION=$BOOTC_VERSION" \
            -f Containerfile.base \
            -t "$BASE_IMAGE_TAG" \
            .

      - name: Build final image
        run: |
          podman build --network=host \
            --build-arg "BASE_IMAGE=$BASE_IMAGE_TAG" \
            -f Containerfile \
            -t "$FINAL_IMAGE_TAG" \
            .

      - name: Rechunk image with chunkah
        run: |
          CHUNKAH_IMAGE="quay.io/jlebon/chunkah:${CHUNKAH_VERSION}"
          CHUNKAH_CONFIG_STR="$(podman inspect "$FINAL_IMAGE_TAG" | jq -c '.')"
          CHUNKAH_ARCHIVE_PATH="$(mktemp "$PWD/chunkah-XXXXXX.ociarchive")"
          SOURCE_CID="$(podman create "$FINAL_IMAGE_TAG")"
          SOURCE_MOUNT="$(podman mount "$SOURCE_CID")"
          cleanup() {
            podman unmount "$SOURCE_CID" >/dev/null 2>&1 || true
            podman rm -f "$SOURCE_CID" >/dev/null 2>&1 || true
            rm -f "$CHUNKAH_ARCHIVE_PATH"
          }
          trap cleanup EXIT
          podman pull "$CHUNKAH_IMAGE"
          podman run --rm \
            -v "$SOURCE_MOUNT:/chunkah:ro" \
            "$CHUNKAH_IMAGE" \
            build --config-str "$CHUNKAH_CONFIG_STR" --max-layers 128 > "$CHUNKAH_ARCHIVE_PATH"
          IMPORTED_IMAGE="$(podman pull "oci-archive:${CHUNKAH_ARCHIVE_PATH}")"
          podman tag "$IMPORTED_IMAGE" "$CHUNKED_IMAGE_TAG"

      - name: Show built image
        run: podman image inspect "$CHUNKED_IMAGE_TAG" >/dev/null

  publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install publish dependencies
        run: sudo apt-get update && sudo apt-get install -y podman jq curl

      - name: Publish image
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: ./scripts/build.sh "$REGISTRY/$REGISTRY_PROJECT" "$REGISTRY_USERNAME" "$REGISTRY_PASSWORD"

  disk:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y podman jq curl zstd

      - name: Install oras
        run: |
          ORAS_VERSION="$(curl -fsSL https://api.github.com/repos/oras-project/oras/releases/latest | jq -r '.tag_name' | sed 's/^v//')"
          curl -fsSLo oras.tar.gz "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          tar -xzf oras.tar.gz oras
          sudo mv oras /usr/local/bin/oras

      - name: Login to registry
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          podman login "$REGISTRY" \
            -u "$REGISTRY_USERNAME" \
            -p "$REGISTRY_PASSWORD"
          oras login "$REGISTRY" \
            -u "$REGISTRY_USERNAME" \
            -p "$REGISTRY_PASSWORD"

      - name: Pull container image
        run: podman pull "$REGISTRY/$REGISTRY_PROJECT:latest"

      - name: Generate bootable disk image
        run: |
          fallocate -l 40G bootable.img
          sudo podman run \
            --rm --privileged --pid=host --network=host \
            -v /var/lib/containers:/var/lib/containers \
            -v /etc/containers:/etc/containers \
            -v /dev:/dev \
            -v "$(pwd):/data" \
            "$REGISTRY/$REGISTRY_PROJECT:latest" \
            bootc install to-disk \
            --composefs-backend \
            --via-loopback /data/bootable.img \
            --filesystem ext4 \
            --wipe \
            --bootloader systemd

      - name: Compress and push disk image
        run: |
          zstd bootable.img -o bootable.img.zst
          oras push "$REGISTRY/$REGISTRY_PROJECT:disk-latest" \
            bootable.img.zst:application/octet-stream
